title: Solusi Terintegrasi, [Kelas Bilie]{class="text-primary"} untuk Digitalisasi Sekolah
description: Platform manajemen akademik terintegrasi yang menghubungkan administrasi sekolah, pembelajaran Moodle, data pengguna, jadwal, nilai, dan monitoring dalam satu sistem.
seo:
  title: Kelas Bilie | Sistem Manajemen Akademik Terintegrasi
  description: Kelola seluruh aktivitas akademik sekolah dari satu dashboard.
    Terintegrasi dengan Moodle untuk pembelajaran digital yang lebih mudah.
navigation: false
hero:
  title: Semua Aktivitas Akademik dalam Satu Dashboard
  description: Kelas Bilie membantu sekolah mengelola pembelajaran, pengguna, kelas, kurikulum, nilai, dan administrasi secara terintegrasi dengan Moodle.
  links:
    - label: Mulai Sekarang
      icon: i-lucide-arrow-right
      trailing: true
      to: /login
      size: xl
    - label: Pelajari Fitur
      icon: i-lucide-book-open
      color: neutral
      variant: subtle
      to: "#features"
      size: xl
sections:
  - title: Mengapa Memilih Kelas Bilie?
    description: Dibangun untuk membantu sekolah mengelola seluruh proses akademik secara lebih efisien dan terintegrasi.
    id: features
    orientation: horizontal
    features:
      - name: Terintegrasi dengan Moodle
        description: Sinkronisasi pembelajaran, peserta, guru, nilai, dan aktivitas Moodle langsung dari satu sistem.
        icon: i-lucide-book-open-check
      - name: Manajemen Akademik
        description: Kelola kelas, jadwal, mata pelajaran, guru, siswa, dan tahun ajaran dengan mudah.
        icon: i-lucide-school
      - name: Dashboard Monitoring
        description: Pantau aktivitas pembelajaran, progres siswa, dan statistik sekolah secara real-time.
        icon: i-lucide-chart-column
    image: /image-section-1.png
  - title: Dibangun untuk Sekolah Modern
    description: Mendukung digitalisasi sekolah mulai dari administrasi hingga proses belajar mengajar.
    orientation: horizontal
    reverse: true
    features:
      - name: Manajemen Pengguna
        description: Kelola akun administrator, guru, siswa, dan wali kelas dalam satu tempat.
        icon: i-lucide-users
      - name: Aman dan Cepat
        description: Menggunakan autentikasi JWT, kontrol hak akses, dan performa tinggi berbasis Nuxt 4.
        icon: i-lucide-shield-check
      - name: Responsif
        description: Dapat digunakan melalui desktop maupun perangkat mobile.
        icon: i-lucide-smartphone
    image: /image-section-2.jpg
features:
  title: Semua yang Dibutuhkan Sekolah
  description: Kelas Bilie menyediakan fitur lengkap untuk mendukung administrasi dan pembelajaran digital.
  items:
    - title: Dashboard Akademik
      description: Ringkasan data sekolah, statistik pembelajaran, dan aktivitas terbaru.
      icon: i-lucide-layout-dashboard
    - title: Integrasi Moodle
      description: Sinkronisasi kursus, peserta, guru, kategori, nilai, dan aktivitas.
      icon: i-lucide-book-marked
    - title: Manajemen Pengguna
      description: Kelola admin, guru, siswa, dan role secara terpusat.
      icon: i-lucide-users
    - title: Jadwal & Kelas
      description: Atur kelas, rombel, mata pelajaran, serta jadwal pembelajaran.
      icon: i-lucide-calendar-days
    - title: Monitoring Pembelajaran
      description: Pantau progres belajar siswa dan aktivitas guru secara real-time.
      icon: i-lucide-chart-line
    - title: Keamanan Data
      description: Sistem autentikasi modern dengan kontrol hak akses berdasarkan peran.
      icon: i-lucide-lock
testimonials:
  headline: Digunakan untuk Digitalisasi Sekolah
  title: Membantu Administrasi dan Pembelajaran
  description: Dirancang untuk mempermudah pekerjaan administrator, guru, dan pengelola sekolah.
  items:
    - quote: Integrasi Moodle membuat pengelolaan pembelajaran jauh lebih mudah.
      user:
        name: Administrator Sekolah
        description: IT Center
        avatar:
          src: https://i.pravatar.cc/120?img=1
    - quote: Dashboard akademik membantu kami memonitor aktivitas belajar setiap hari.
      user:
        name: Marcus Rodriguez
        description: Wakil Kepala Sekolah Bidang Kurikulum
        avatar:
          src: https://i.pravatar.cc/120?img=7
    - quote: Data guru, siswa, dan kelas kini tersusun rapi dalam satu aplikasi.
      user:
        name: David Kumar
        description: Kepala Sekolah
        avatar:
          src: https://i.pravatar.cc/120?img=3
    - quote: Perfect Lighthouse scores out of the box. Our Core Web Vitals improved dramatically just by switching to Nuxt UI components.
      user:
        name: Emily Zhang
        description: Lead Architect at ScaleForce
        avatar:
          src: https://i.pravatar.cc/120?img=5
    - quote: The Tailwind Variants system makes customization so intuitive. We can override any component style while keeping the functionality intact.
      user:
        name: James Wilson
        description: DevOps Lead at CloudPro
        avatar:
          src: https://i.pravatar.cc/120?img=8
    - quote: From the SaaS template to production in days. The pre-built layouts, navigation, and content structure accelerated our launch.
      user:
        name: Lisa Patel
        description: CEO at AutoScale
        avatar:
          src: https://i.pravatar.cc/120?img=9
    - quote: Reka UI foundation means accessibility is never an afterthought. We achieved WCAG compliance without any custom work.
      user:
        name: Michael Torres
        description: Frontend Lead at AccessFirst
        avatar:
          src: https://i.pravatar.cc/120?img=11
    - quote: The documentation is outstanding. Every component has clear examples, and the community on Discord is incredibly helpful.
      user:
        name: Rachel Kim
        description: Performance Engineer at APIHub
        avatar:
          src: https://i.pravatar.cc/120?img=10
    - quote: We replaced three different UI libraries with Nuxt UI. The consistency and quality across all components is unmatched.
      user:
        name: Thomas Weber
        description: UI Architecture Lead at DesignScale
        avatar:
          src: https://i.pravatar.cc/120?img=12
    - quote: The integration with Nuxt modules is seamless. Color mode, fonts, icons - everything works together perfectly.
      user:
        name: Sophia Martinez
        description: Integration Specialist at TechFlow
        avatar:
          src: https://i.pravatar.cc/120?img=14
cta:
  title: Mulai Digitalisasi Sekolah Anda
  description: Kelola administrasi akademik dan pembelajaran Moodle dalam satu platform yang modern, cepat, dan mudah digunakan.
  links:
    - label: Masuk ke Dashboard
      to: '/login'
      target: _blank
      trailingIcon: i-lucide-arrow-right
    - label: View our website
      to: 'https://smpbilingualterpadu2.sch.id'
      target: _blank
